<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Static preview data -->
  <title>YouTube Audio</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="YouTube Audio">
  <meta property="og:description" content="Listen to this YouTube audio.">
  <meta property="og:image" content="https://i.ytimg.com/vi/AaIBMfdtR6M/hqdefault.jpg">
  <meta property="og:image:secure_url" content="https://i.ytimg.com/vi/CShopT9QUzw/hqdefault.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="480">
  <meta property="og:image:height" content="360">
  <meta property="og:url" content="https://burning-calamity.github.io/op-message-encryptor-and-decryptor/tests/">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="YouTube Audio">
  <meta name="twitter:description" content="Listen to this YouTube audio.">
  <meta name="twitter:image" content="https://i.ytimg.com/vi/CShopT9QUzw/hqdefault.jpg">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    #player {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .box {
      max-width: 600px;
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
      display: none;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <div class="box">
    <img id="thumbnail" src="https://i.ytimg.com/vi/CShopT9QUzw/hqdefault.jpg" alt="YouTube thumbnail">
    <h1 id="videoTitle">Loading...</h1>
    <p id="status">Trying to play audio automatically...</p>
    <button id="playButton">Click to play audio</button>
  </div>

  <script>
    const videoLink = "https://www.youtube.com/watch?v=CShopT9QUzw";

    let videoId;
    let player;
    let hasStarted = false;

    function getYouTubeVideoId(url) {
      const parsedUrl = new URL(url);

      if (parsedUrl.hostname.includes("youtube.com")) {
        if (parsedUrl.pathname === "/watch") {
          return parsedUrl.searchParams.get("v");
        }

        if (parsedUrl.pathname.startsWith("/embed/")) {
          return parsedUrl.pathname.split("/embed/")[1].split("/")[0];
        }

        if (parsedUrl.pathname.startsWith("/shorts/")) {
          return parsedUrl.pathname.split("/shorts/")[1].split("/")[0];
        }
      }

      if (parsedUrl.hostname.includes("youtu.be")) {
        return parsedUrl.pathname.replace("/", "").split("?")[0];
      }

      return null;
    }

    videoId = getYouTubeVideoId(videoLink);

    if (!videoId) {
      document.title = "Invalid YouTube link";
      document.getElementById("videoTitle").textContent = "Invalid YouTube link";
      document.getElementById("status").textContent = "Invalid video link.";
      throw new Error("Invalid YouTube link");
    }

    const thumbnailUrl = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
    document.getElementById("thumbnail").src = thumbnailUrl;

    fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(videoLink)}&format=json`)
      .then(response => response.json())
      .then(data => {
        document.title = data.title;
        document.getElementById("videoTitle").textContent = data.title;
      })
      .catch(() => {
        document.title = "YouTube Audio";
        document.getElementById("videoTitle").textContent = "YouTube Audio";
      });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 0,
          loop: 1,
          playlist: videoId,
          modestbranding: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      try {
        event.target.unMute();
        event.target.setVolume(100);
        event.target.playVideo();
      } catch (error) {
        showPlayButton();
      }

      setTimeout(() => {
        if (!hasStarted) {
          showPlayButton();
        }
      }, 2000);
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        hasStarted = true;
        document.getElementById("status").textContent = "Audio is playing.";
        document.getElementById("playButton").style.display = "none";
      }
    }

    function showPlayButton() {
      document.getElementById("status").textContent =
        "Your browser blocked autoplay with sound.";
      document.getElementById("playButton").style.display = "inline-block";
    }

    document.getElementById("playButton").addEventListener("click", () => {
      player.unMute();
      player.setVolume(100);
      player.playVideo();
    });
  </script>
</body>
</html>
