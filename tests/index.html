<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Loading...</title>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="YouTube Audio" />
  <meta property="og:description" content="Listen to this YouTube audio." />
  <meta property="og:image" content="" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="YouTube Audio" />
  <meta name="twitter:description" content="Listen to this YouTube audio." />
  <meta name="twitter:image" content="" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    #player {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .box {
      max-width: 600px;
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      margin-bottom: 20px;
      background: #222;
    }

    button {
      padding: 14px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: black;
      display: none;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <div class="box">
    <img id="thumbnail" alt="YouTube thumbnail">
    <h1 id="videoTitle">Loading...</h1>
    <p id="status">Trying to play audio automatically...</p>
    <button id="playButton">Click to play audio</button>
  </div>

  <script>
    /*
      Change only this variable.
    */
    const videoLink = "https://youtu.be/CShopT9QUzw?list=RDMM";

    let videoId;
    let player;
    let hasStarted = false;

    function getYouTubeVideoId(url) {
      try {
        const parsedUrl = new URL(url);

        if (parsedUrl.hostname.includes("youtube.com")) {
          if (parsedUrl.pathname === "/watch") {
            return parsedUrl.searchParams.get("v");
          }

          if (parsedUrl.pathname.startsWith("/embed/")) {
            return parsedUrl.pathname.split("/embed/")[1].split("/")[0];
          }

          if (parsedUrl.pathname.startsWith("/shorts/")) {
            return parsedUrl.pathname.split("/shorts/")[1].split("/")[0];
          }
        }

        if (parsedUrl.hostname.includes("youtu.be")) {
          return parsedUrl.pathname.replace("/", "").split("?")[0];
        }

        return null;
      } catch {
        return null;
      }
    }

    function setMeta(selector, value) {
      const tag = document.querySelector(selector);
      if (tag) {
        tag.setAttribute("content", value);
      }
    }

    function setThumbnail(videoId) {
      const thumbnail = document.getElementById("thumbnail");

      const thumbnails = [
        `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
        `https://img.youtube.com/vi/${videoId}/sddefault.jpg`,
        `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
        `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
        `https://img.youtube.com/vi/${videoId}/default.jpg`
      ];

      let index = 0;

      function tryNextThumbnail() {
        if (index >= thumbnails.length) {
          thumbnail.style.display = "none";
          return;
        }

        const testImage = new Image();

        testImage.onload = function () {
          /*
            maxresdefault sometimes loads a tiny "not available" image.
            If it is too small, skip it.
          */
          if (testImage.naturalWidth < 120 || testImage.naturalHeight < 90) {
            index++;
            tryNextThumbnail();
            return;
          }

          thumbnail.src = thumbnails[index];

          setMeta('meta[property="og:image"]', thumbnails[index]);
          setMeta('meta[name="twitter:image"]', thumbnails[index]);
        };

        testImage.onerror = function () {
          index++;
          tryNextThumbnail();
        };

        testImage.src = thumbnails[index];
      }

      tryNextThumbnail();
    }

    videoId = getYouTubeVideoId(videoLink);

    if (!videoId) {
      document.title = "Invalid YouTube link";
      document.getElementById("videoTitle").textContent = "Invalid YouTube link";
      document.getElementById("status").textContent = "Please check the videoLink variable.";
      throw new Error("Invalid YouTube link");
    }

    setThumbnail(videoId);

    fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(videoLink)}&format=json`)
      .then(response => response.json())
      .then(data => {
        const title = data.title;

        document.title = title;
        document.getElementById("videoTitle").textContent = title;

        setMeta('meta[property="og:title"]', title);
        setMeta('meta[name="twitter:title"]', title);

        if (data.thumbnail_url) {
          document.getElementById("thumbnail").src = data.thumbnail_url;
          setMeta('meta[property="og:image"]', data.thumbnail_url);
          setMeta('meta[name="twitter:image"]', data.thumbnail_url);
        }
      })
      .catch(() => {
        document.title = "YouTube Audio";
        document.getElementById("videoTitle").textContent = "YouTube Audio";
      });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 0,
          loop: 1,
          playlist: videoId,
          modestbranding: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }

    function onPlayerReady(event) {
      try {
        event.target.unMute();
        event.target.setVolume(100);
        event.target.playVideo();
      } catch (error) {
        showPlayButton();
      }

      setTimeout(() => {
        if (!hasStarted) {
          showPlayButton();
        }
      }, 2000);
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        hasStarted = true;
        document.getElementById("status").textContent = "Audio is playing.";
        document.getElementById("playButton").style.display = "none";
      }
    }

    function showPlayButton() {
      document.getElementById("status").textContent =
        "Your browser blocked autoplay with sound.";
      document.getElementById("playButton").style.display = "inline-block";
    }

    document.getElementById("playButton").addEventListener("click", () => {
      player.unMute();
      player.setVolume(100);
      player.playVideo();
    });
  </script>
</body>
</html>
