<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Phonk - Audio Loop</title>

    <!-- DISCORD & SOCIAL MEDIA PREVIEW EMBEDS (Open Graph Tags) -->
    <!-- Replace 'https://yourwebsite.com' with your actual live website link -->
    <meta property="og:url" content="https://www.youtube.com/watch?v=AaIBMfdtR6M">
    <meta property="og:type" content="website">
    <meta property="og:title" content="SOCRATES PHONK">
    <meta property="og:description" content="Listen to the heat. Auto-playing audio loop.">
    
    <!-- This fetches the maximum resolution thumbnail directly from the YouTube video -->
    <meta property="og:image" content="https://youtube.com">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter / Discord Large Card Fallback -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #060210);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Full screen overlay acting as an interactive bridge for browser audio policies */
        .click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 32, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .click-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #8a85a5;
            margin: 0 0 20px 0;
        }

        .pulse-text {
            font-size: 0.9rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #youtube-audio-player {
            display: none;
        }
    </style>
</head>
<!-- Clicking anywhere on the screen triggers the audio unblock sequence -->
<body onclick="unlockAudio()">

    <!-- Overlay that clears browser restrictions -->
    <div class="click-overlay" id="audio-gate">
        <h1>SOCRATES PHONK</h1>
        <p>Listen to the heat...</p>
        <div class="pulse-text">Click anywhere to enter & play</div>
    </div>

    <div class="main-content">
        <h1>Now Playing Loop</h1>
    </div>

    <!-- Hidden YouTube iframe container -->
    <div id="youtube-audio-player"></div>

    <script>
        const youtubeVideoId = 'AaIBMfdtR6M'; 
        let player;
        let isPlayerReady = false;

        // Load the YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://youtube.com";
        const firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '0',
                width: '0',
                videoId: youtubeVideoId,
                playerVars: {
                    'autoplay': 1,               // Load and buffer immediately
                    'mute': 1,                   // Start muted to bypass browser block policies
                    'loop': 1,                   
                    'playlist': youtubeVideoId,  
                    'controls': 0,               
                    'disablekb': 1,             
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
            // The video starts playing muted immediately upon loading
            player.playVideo(); 
        }

        // Unmutes and plays audio the moment the user clicks anywhere
        function unlockAudio() {
            const gate = document.getElementById('audio-gate');
            
            if (player && isPlayerReady) {
                player.unMute();
                player.setVolume(100);
                player.playVideo(); // Ensures it plays even if paused
                
                // Smoothly hide the landing screen overlay
                gate.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
