<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Phonk - Audio Loop</title>

    <!-- DISCORD & SOCIAL MEDIA PREVIEW EMBEDS -->
    <!-- The meta tag is perfectly configured to scrape the official Socrates Phonk cover art -->
    <meta property="og:url" content="https://burning-calamity.github.io/op-message-encryptor-and-decryptor/random%20stuff/index.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="SOCRATES PHONK">
    <meta property="og:description" content="Listen to the heat. Auto-playing audio loop.">
    <meta property="og:image" content="https://youtube.com">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #060210);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Full screen overlay acting as an interactive bridge for browser audio policies */
        .click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 32, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .click-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        p {
            font-size: 1.2rem;
            color: #8a85a5;
            margin: 0 0 20px 0;
        }

        .pulse-text {
            font-size: 0.9rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* FIX: Making the player size 200x200 pixels but positioning it completely off-screen */
        /* This tricks the browser engine into treating it as an active visible playback node */
        #player-wrapper {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 200px;
            height: 200px;
            overflow: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- FIX: Moved the onclick function directly to the gate overlay so the browser registers the user interaction -->
    <div class="click-overlay" id="audio-gate" onclick="unlockAudio()">
        <h1>SOCRATES PHONK</h1>
        <p>Listen to the heat...</p>
        <div class="pulse-text">Click anywhere to enter & play</div>
    </div>

    <div class="main-content">
        <h1>Now Playing Loop</h1>
    </div>

    <!-- Hidden Wrapper for YouTube player framework -->
    <div id="player-wrapper">
        <div id="youtube-audio-player"></div>
    </div>

    <script>
        const youtubeVideoId = 'AaIBMfdtR6M'; 
        let player;
        let isPlayerReady = false;

        // Load the YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '200',  // FIX: Set explicit non-zero dimensions
                width: '200',   // FIX: Set explicit non-zero dimensions
                videoId: youtubeVideoId,
                playerVars: {
                    'autoplay': 1,               
                    'mute': 1,                   // Keeps browser background blocking engine calm
                    'loop': 1,                   
                    'playlist': youtubeVideoId,  
                    'controls': 0,               
                    'disablekb': 1,             
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
            player.playVideo(); // Pre-buffers track state silently in background
        }

        function unlockAudio() {
            const gate = document.getElementById('audio-gate');
            
            if (player && isPlayerReady) {
                player.unMute();
                player.setVolume(100);
                player.playVideo(); 
                
                // Smoothly dismiss entry sequence layout
                gate.classList.add('hidden');
            } else {
                // If clicked prematurely before API is complete, fallback kick execution loop
                setTimeout(unlockAudio, 200);
            }
        }
    </script>
</body>
</html>
