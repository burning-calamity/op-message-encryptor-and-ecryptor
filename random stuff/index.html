<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socrates Phonk</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c20, #060210);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        p {
            font-size: 1.1rem;
            color: #8a85a5;
            margin-bottom: 30px;
        }

        .enter-btn {
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #060210;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 255, 204, 0.4);
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 204, 0.6);
        }

        #youtube-audio-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SOCRATES PHONK</h1>
        <p>Listen to the heat...</p>
        <button class="enter-btn" id="start-btn" onclick="activateAudio()">Listen</button>
    </div>

    <!-- Hidden YouTube iframe container -->
    <div id="youtube-audio-player"></div>

    <script>
        // Target Video ID for Socrates Phonk
        const youtubeVideoId = 'AaIBMfdtR6M'; 
        let player;
        let isPlayerReady = false;

        // Load the YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Configure player to loop seamlessly and play as soon as it initializes
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '0',
                width: '0',
                videoId: youtubeVideoId,
                playerVars: {
                    'autoplay': 1,               // Forces autoplay instantly upon loading
                    'loop': 1,                   // Enables looping
                    'playlist': youtubeVideoId,  // YouTube requires the video ID repeated here to loop a single video
                    'controls': 0,               
                    'disablekb': 1,             
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        // Fires the exact moment the video loads and is ready for playback
        function onPlayerReady(event) {
            isPlayerReady = true;
            // Attempt an unmuted play immediately in case the browser allows it
            player.playVideo(); 
        }

        // Activates/unblocks audio instantly when the user clicks the layout
        function activateAudio() {
            const startBtn = document.getElementById('start-btn');
            
            if (player) {
                player.playVideo();
                startBtn.innerText = "Playing Loop...";
                startBtn.style.background = "#1a1630";
                startBtn.style.color = "#666";
                startBtn.style.boxShadow = "none";
                startBtn.disabled = true;
            } else {
                startBtn.innerText = "Loading track...";
            }
        }
    </script>
</body>
</html>
